<!DOCTYPE html>
<html lang="pt-BR">
<head>

                    <button type="submit" class="btn-primary btn-block" style="margin-top:10px;">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
