<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - OTMake10</title>
    <link rel="stylesheet" href="style.css">
    <script src="theme.js?v=2" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray">
    <!-- Header Simples -->
    <header class="header">
        <div class="header-container justify-center">
            <div class="logo">
                <a href="index.html">OTMake10</a>
            </div>
        </div>
    </header>

    <main class="auth-main">
        <div class="auth-card auth-card-large">
            <div class="auth-header">
                <h2>Criar nova conta</h2>
            </div>
            <div class="auth-body">
                <div class="toggle-container">
                    <span class="toggle-label" id="label-pf">Pessoa FÃ­sica</span>
                    <label class="switch">
                        <input type="checkbox" id="pj-toggle">
                        <span class="slider round"></span>
                    </label>
                    <span class="toggle-label-orange">Sou Pessoa JurÃ­dica</span>
                </div>

                <div id="feedback-msg" class="feedback-msg hidden"></div>

                <form id="cadastro-form">
                    <!-- SeÃ§Ã£o Dados Pessoais / Corporativos -->
                    <div class="form-section">
                        <h3><i class="fas fa-user-circle"></i> Dados de Acesso</h3>
                        
                        <!-- PF Fields -->
                        <div id="pf-fields" class="form-grid">
                            <div class="form-group col-span-2">
                                <label>Nome Completo *</label>
                                <input type="text" id="nome" placeholder="Seu nome completo" required>
                            </div>
                            <div class="form-group">
                                <label>CPF *</label>
                                <input type="text" id="cpf" placeholder="000.000.000-00" required data-mask="cpf" maxlength="14">
                            </div>
                            <div class="form-group">
                                <label>Telefone Celular *</label>
                                <input type="text" id="telefone-pf" placeholder="(00) 00000-0000" required data-mask="telefone" maxlength="15">
                            </div>
                        </div>

                        <!-- PJ Fields (Hidden by default) -->
                        <div id="pj-fields" class="form-grid hidden">
                            <div class="form-group col-span-2">
                                <label>RazÃ£o Social *</label>
                                <input type="text" id="razao-social" placeholder="RazÃ£o Social da Empresa">
                            </div>
                            <div class="form-group">
                                <label>CNPJ *</label>
                                <input type="text" id="cnpj" placeholder="00.000.000/0000-00" data-mask="cnpj" maxlength="18">
                            </div>
                            <div class="form-group">
                                <label>InscriÃ§Ã£o Estadual</label>
                                <input type="text" id="ie" placeholder="Isento ou NÃºmero">
                            </div>
                            <div class="form-group">
                                <label>Telefone Comercial *</label>
                                <input type="text" id="telefone-pj" placeholder="(00) 0000-0000" data-mask="telefone" maxlength="15">
                            </div>
                        </div>

                        <!-- Common Access Fields -->
                        <div class="form-grid mt-15">
                            <div class="form-group">
                                <label id="label-email">E-mail *</label>
                                <input type="email" id="email-cad" placeholder="Seu e-mail" required>
                            </div>
                            <div class="form-group">
                                <label>Senha *</label>
                                <input type="password" id="senha-cad" placeholder="Crie uma senha forte" required>
                            </div>
                        </div>
                    </div>

                    <!-- SeÃ§Ã£o EndereÃ§o -->
                    <div class="form-section">
                        <h3><i class="fas fa-map-marker-alt"></i> EndereÃ§o de Entrega</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>CEP *</label>
                                <div class="cep-group">
                                    <input type="text" id="cep" placeholder="00000-000" required data-mask="cep" maxlength="9">
                                    <button type="button" id="btn-busca-cep" class="btn-secondary"><i class="fas fa-search"></i></button>
                                </div>
                            </div>
                            <div class="form-group col-span-2">
                                <label>Logradouro *</label>
                                <input type="text" id="logradouro" required>
                            </div>
                            <div class="form-group">
                                <label>NÃºmero *</label>
                                <input type="text" id="numero" required>
                            </div>
                            <div class="form-group">
                                <label>Complemento</label>
                                <input type="text" id="complemento">
                            </div>
                            <div class="form-group">
                                <label>Bairro *</label>
                                <input type="text" id="bairro" required>
                            </div>
                            <div class="form-group">
                                <label>Cidade *</label>
                                <input type="text" id="cidade" required>
                            </div>
                            <div class="form-group">
                                <label>Estado *</label>
                                <input type="text" id="estado" placeholder="Ex: SP" required maxlength="2" list="lista-estados" style="text-transform:uppercase">
                                <datalist id="lista-estados">
                                    <option value="AC">Acre</option>
                                    <option value="AL">Alagoas</option>
                                    <option value="AP">AmapÃ¡</option>
                                    <option value="AM">Amazonas</option>
                                    <option value="BA">Bahia</option>
                                    <option value="CE">CearÃ¡</option>
                                    <option value="DF">Distrito Federal</option>
                                    <option value="ES">EspÃ­rito Santo</option>
                                    <option value="GO">GoiÃ¡s</option>
                                    <option value="MA">MaranhÃ£o</option>
                                    <option value="MT">Mato Grosso</option>
                                    <option value="MS">Mato Grosso do Sul</option>
                                    <option value="MG">Minas Gerais</option>
                                    <option value="PA">ParÃ¡</option>
                                    <option value="PB">ParaÃ­ba</option>
                                    <option value="PR">ParanÃ¡</option>
                                    <option value="PE">Pernambuco</option>
                                    <option value="PI">PiauÃ­</option>
                                    <option value="RJ">Rio de Janeiro</option>
                                    <option value="RN">Rio Grande do Norte</option>
                                    <option value="RS">Rio Grande do Sul</option>
                                    <option value="RO">RondÃ´nia</option>
                                    <option value="RR">Roraima</option>
                                    <option value="SC">Santa Catarina</option>
                                    <option value="SP">SÃ£o Paulo</option>
                                    <option value="SE">Sergipe</option>
                                    <option value="TO">Tocantins</option>
                                </datalist>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary btn-block mt-20">Finalizar Cadastro</button>
                </form>
                <div class="auth-footer mt-20 text-center">
                    <p>JÃ¡ tem uma conta? <a href="login.html" class="link-orange">Fazer login</a></p>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="validators.js"></script>
    <script src="script.js"></script>
</body>
</html>
