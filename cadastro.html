<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - EcoStore</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray">
    <!-- Header Simples -->
    <header class="header">
        <div class="header-container justify-center">
            <div class="logo">
                <a href="index.html">EcoStore</a>
            </div>
        </div>
    </header>

    <main class="auth-main">
        <div class="auth-card auth-card-large">
            <div class="auth-header">
                <h2>Criar nova conta</h2>
            </div>
            <div class="auth-body">
                <div class="toggle-container">
                    <span class="toggle-label" id="label-pf">Pessoa Física</span>
                    <label class="switch">
                        <input type="checkbox" id="pj-toggle">
                        <span class="slider round"></span>
                    </label>
                    <span class="toggle-label-orange">Sou Pessoa Jurídica</span>
                </div>

                <div id="feedback-msg" class="feedback-msg hidden"></div>

                <form id="cadastro-form">
                    <!-- Seção Dados Pessoais / Corporativos -->
                    <div class="form-section">
                        <h3><i class="fas fa-user-circle"></i> Dados de Acesso</h3>
                        
                        <!-- PF Fields -->
                        <div id="pf-fields" class="form-grid">
                            <div class="form-group col-span-2">
                                <label>Nome Completo *</label>
                                <input type="text" id="nome" placeholder="Seu nome completo" required>
                            </div>
                            <div class="form-group">
                                <label>CPF *</label>
                                <input type="text" id="cpf" placeholder="000.000.000-00" required>
                            </div>
                            <div class="form-group">
                                <label>Telefone Celular *</label>
                                <input type="text" id="telefone-pf" placeholder="(00) 00000-0000" required>
                            </div>
                        </div>

                        <!-- PJ Fields (Hidden by default) -->
                        <div id="pj-fields" class="form-grid hidden">
                            <div class="form-group col-span-2">
                                <label>Razão Social *</label>
                                <input type="text" id="razao-social" placeholder="Razão Social da Empresa">
                            </div>
                            <div class="form-group">
                                <label>CNPJ *</label>
                                <input type="text" id="cnpj" placeholder="00.000.000/0000-00">
                            </div>
                            <div class="form-group">
                                <label>Inscrição Estadual</label>
                                <input type="text" id="ie" placeholder="Isento ou Número">
                            </div>
                            <div class="form-group">
                                <label>Telefone Comercial *</label>
                                <input type="text" id="telefone-pj" placeholder="(00) 0000-0000">
                            </div>
                        </div>

                        <!-- Common Access Fields -->
                        <div class="form-grid mt-15">
                            <div class="form-group">
                                <label id="label-email">E-mail *</label>
                                <input type="email" id="email-cad" placeholder="Seu e-mail" required>
                            </div>
                            <div class="form-group">
                                <label>Senha *</label>
                                <input type="password" id="senha-cad" placeholder="Crie uma senha forte" required>
                            </div>
                        </div>
                    </div>

                    <!-- Seção Endereço -->
                    <div class="form-section">
                        <h3><i class="fas fa-map-marker-alt"></i> Endereço de Entrega</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>CEP *</label>
                                <div class="cep-group">
                                    <input type="text" id="cep" placeholder="00000-000" required>
                                    <button type="button" id="btn-busca-cep" class="btn-secondary"><i class="fas fa-search"></i></button>
                                </div>
                            </div>
                            <div class="form-group col-span-2">
                                <label>Logradouro *</label>
                                <input type="text" id="logradouro" required>
                            </div>
                            <div class="form-group">
                                <label>Número *</label>
                                <input type="text" id="numero" required>
                            </div>
                            <div class="form-group">
                                <label>Complemento</label>
                                <input type="text" id="complemento">
                            </div>
                            <div class="form-group">
                                <label>Bairro *</label>
                                <input type="text" id="bairro" required>
                            </div>
                            <div class="form-group">
                                <label>Cidade *</label>
                                <input type="text" id="cidade" required>
                            </div>
                            <div class="form-group">
                                <label>Estado *</label>
                                <select id="estado" required>
                                    <option value="">Selecione...</option>
                                    <option value="SP">São Paulo</option>
                                    <option value="RJ">Rio de Janeiro</option>
                                    <option value="MG">Minas Gerais</option>
                                    <option value="RS">Rio Grande do Sul</option>
                                    <option value="PR">Paraná</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary btn-block mt-20">Finalizar Cadastro</button>
                </form>
                <div class="auth-footer mt-20 text-center">
                    <p>Já tem uma conta? <a href="login.html" class="link-orange">Fazer login</a></p>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
